name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.ts" "test/**/*.ts"

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Run end-to-end tests
        env:
          CI: true
        run: npm run test:e2e -- --runInBand
